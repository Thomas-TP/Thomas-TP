name: Update profile activity

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-profile.yml"
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Update featured projects
        uses: actions/github-script@v8
        with:
          script: |
            const owner = "Thomas-TP";
            const profileRepo = "Thomas-TP";
            const now = new Date().toISOString().slice(0, 10);

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              type: "owner",
              sort: "pushed",
              direction: "desc",
              per_page: 100,
            });

            const featuredRepos = repos
              .filter((repo) => !repo.archived && !repo.fork && repo.name !== profileRepo)
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
              .slice(0, 4);

            const badgeUrl = (label, value, color) => {
              const encodedLabel = encodeURIComponent(label);
              const encodedValue = encodeURIComponent(String(value));
              return `https://img.shields.io/badge/${encodedLabel}-${encodedValue}-${color}?style=flat-square`;
            };

            const cards = featuredRepos.map((repo, index) => {
              const description = repo.description || "Projet en cours";
              const language = repo.language || "Mixed";
              const pushed = repo.pushed_at ? repo.pushed_at.slice(0, 10) : "n/a";
              const liveLink = repo.homepage
                ? `<a href="${repo.homepage}">Live</a> · `
                : "";
              const accent = ["2ea44f", "0969da", "bf3989", "d29922"][index % 4];

              return [
                `<td width="50%" valign="top">`,
                `  <h3><a href="${repo.html_url}">${repo.name}</a></h3>`,
                `  <p>${description}</p>`,
                `  <p>`,
                `    <img alt="Stack ${language}" src="${badgeUrl("Stack", language, accent)}" />`,
                `    <img alt="${repo.stargazers_count} stars" src="${badgeUrl("Stars", repo.stargazers_count, "111827")}" />`,
                `    <img alt="${repo.forks_count} forks" src="${badgeUrl("Forks", repo.forks_count, "111827")}" />`,
                `    <img alt="${repo.open_issues_count} issues" src="${badgeUrl("Issues", repo.open_issues_count, "111827")}" />`,
                `  </p>`,
                `  <p>${liveLink}<a href="${repo.html_url}">Repository</a></p>`,
                `  <sub>Derniere activite: ${pushed}</sub>`,
                `</td>`,
              ].join("\n");
            });

            const rows = [];
            for (let index = 0; index < cards.length; index += 2) {
              rows.push(`<tr>\n${cards.slice(index, index + 2).join("\n")}\n</tr>`);
            }

            const dynamic = [
              "<!-- FEATURED-PROJECTS:START -->",
              "",
              `<table width="100%">`,
              rows.join("\n"),
              `</table>`,
              "",
              `<p align="center"><sub>4 projets publics les plus actifs, mis a jour automatiquement le ${now} par GitHub Actions.</sub></p>`,
              "",
              "<!-- FEATURED-PROJECTS:END -->",
            ].join("\n");

            const readme = await github.rest.repos.getContent({
              owner,
              repo: profileRepo,
              path: "README.md",
            });

            const current = Buffer.from(readme.data.content, "base64").toString("utf8");
            const pattern = /<!-- FEATURED-PROJECTS:START -->[\s\S]*<!-- FEATURED-PROJECTS:END -->/;
            if (!pattern.test(current)) {
              core.setFailed("README.md does not contain FEATURED-PROJECTS markers.");
              return;
            }

            const next = current.replace(pattern, dynamic);
            if (next === current) {
              core.info("README already up to date.");
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo: profileRepo,
              path: "README.md",
              message: "Update featured projects",
              content: Buffer.from(next, "utf8").toString("base64"),
              sha: readme.data.sha,
            });
