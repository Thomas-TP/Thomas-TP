name: Update profile activity

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-profile.yml"
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Update featured projects
        uses: actions/github-script@v7
        with:
          script: |
            const owner = "Thomas-TP";
            const profileRepo = "Thomas-TP";
            const now = new Date().toISOString().slice(0, 10);

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              type: "owner",
              sort: "pushed",
              direction: "desc",
              per_page: 100,
            });

            const featuredRepos = repos
              .filter((repo) => !repo.archived && !repo.fork && repo.name !== profileRepo)
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
              .slice(0, 4);

            const rows = featuredRepos.map((repo) => {
              const description = repo.description || "Projet en cours";
              const language = repo.language || "Mixed";
              const pushed = repo.pushed_at ? repo.pushed_at.slice(0, 10) : "n/a";
              const homepage = repo.homepage ? ` · [Live](${repo.homepage})` : "";
              const stats = `Stars: ${repo.stargazers_count} · Forks: ${repo.forks_count} · Issues: ${repo.open_issues_count}`;
              return `| [${repo.name}](${repo.html_url})${homepage} | ${description} | ${language} | ${stats} | ${pushed} |`;
            }).join("\n");

            const dynamic = [
              "<!-- FEATURED-PROJECTS:START -->",
              "",
              "| Projet | Description GitHub | Stack | Stats | Derniere activite |",
              "| --- | --- | --- | --- | --- |",
              rows,
              "",
              `<p align="center"><sub>4 projets publics les plus actifs, mis a jour automatiquement le ${now} par GitHub Actions.</sub></p>`,
              "",
              "<!-- FEATURED-PROJECTS:END -->",
            ].join("\n");

            const readme = await github.rest.repos.getContent({
              owner,
              repo: profileRepo,
              path: "README.md",
            });

            const current = Buffer.from(readme.data.content, "base64").toString("utf8");
            const pattern = /<!-- FEATURED-PROJECTS:START -->[\s\S]*<!-- FEATURED-PROJECTS:END -->/;
            if (!pattern.test(current)) {
              core.setFailed("README.md does not contain FEATURED-PROJECTS markers.");
              return;
            }

            const next = current.replace(pattern, dynamic);
            if (next === current) {
              core.info("README already up to date.");
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo: profileRepo,
              path: "README.md",
              message: "Update featured projects",
              content: Buffer.from(next, "utf8").toString("base64"),
              sha: readme.data.sha,
            });
