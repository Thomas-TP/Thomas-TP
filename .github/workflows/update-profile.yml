name: Update profile activity

"on":
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Update README dynamic section
        uses: actions/github-script@v7
        with:
          script: |
            const owner = "Thomas-TP";
            const profileRepo = "Thomas-TP";
            const now = new Date().toISOString().slice(0, 10);

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              type: "owner",
              sort: "pushed",
              direction: "desc",
              per_page: 100,
            });

            const activeRepos = repos
              .filter((repo) => !repo.archived && !repo.fork && repo.name !== profileRepo)
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
              .slice(0, 3);

            const repoRows = activeRepos.map((repo) => {
              const description = repo.description || "Projet en cours";
              const language = repo.language || "Mixed";
              const pushed = repo.pushed_at ? repo.pushed_at.slice(0, 10) : "n/a";
              return `| [${repo.name}](${repo.html_url}) | ${description} | ${language} | ${pushed} |`;
            }).join("\n");

            const events = await github.rest.activity.listPublicEventsForUser({
              username: owner,
              per_page: 20,
            });

            const eventLines = events.data
              .filter((event) => ["PushEvent", "CreateEvent", "ReleaseEvent", "PullRequestEvent"].includes(event.type))
              .slice(0, 5)
              .map((event) => {
                const repoName = event.repo?.name || owner;
                const repoUrl = `https://github.com/${repoName}`;
                const date = event.created_at.slice(0, 10);
                if (event.type === "PushEvent") {
                  const count = event.payload?.commits?.length || 1;
                  return `- ${date}: ${count} commit(s) sur [${repoName}](${repoUrl})`;
                }
                if (event.type === "CreateEvent") {
                  return `- ${date}: creation ${event.payload?.ref_type || "ressource"} sur [${repoName}](${repoUrl})`;
                }
                if (event.type === "ReleaseEvent") {
                  return `- ${date}: release publiee sur [${repoName}](${repoUrl})`;
                }
                return `- ${date}: activite pull request sur [${repoName}](${repoUrl})`;
              })
              .join("\n") || "- Aucune activite publique recente detectee.";

            const dynamic = `<!-- PROFILE-ACTIVITY:START -->

### Projets les plus actifs

| Projet | Focus | Stack | Derniere activite |
| --- | --- | --- | --- |
${repoRows}

### Derniere activite publique

${eventLines}

<p align="center"><sub>Mis a jour automatiquement le ${now} par GitHub Actions.</sub></p>

<!-- PROFILE-ACTIVITY:END -->`;

            const readme = await github.rest.repos.getContent({
              owner,
              repo: profileRepo,
              path: "README.md",
            });

            const current = Buffer.from(readme.data.content, "base64").toString("utf8");
            const pattern = /<!-- PROFILE-ACTIVITY:START -->[\s\S]*<!-- PROFILE-ACTIVITY:END -->/;
            if (!pattern.test(current)) {
              core.setFailed("README.md does not contain PROFILE-ACTIVITY markers.");
              return;
            }

            const next = current.replace(pattern, dynamic);
            if (next === current) {
              core.info("README already up to date.");
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo: profileRepo,
              path: "README.md",
              message: "Update profile activity",
              content: Buffer.from(next, "utf8").toString("base64"),
              sha: readme.data.sha,
            });
